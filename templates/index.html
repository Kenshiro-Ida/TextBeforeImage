<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AddTeXT.io - Auto Insert Text Between Your Images</title>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:700,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
            background: #f7f8fa;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(60,60,120,0.10);
            padding: 48px 32px 32px 32px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            margin: 32px 0;
        }
        .brand-title {
            font-size: 2.6em;
            font-weight: 700;
            letter-spacing: -2px;
            color: #222;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 1.18em;
            color: #666;
            margin-bottom: 32px;
        }
        .upload-area {
            border: 2.5px dashed #bfc3d9;
            border-radius: 16px;
            padding: 48px 18px;
            margin-bottom: 24px;
            background: #f7f8fa;
            transition: border-color 0.2s, background 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #6c63ff;
            background: #f0f1ff;
        }
        .upload-icon {
            font-size: 3.2em;
            color: #bfc3d9;
            margin-bottom: 12px;
        }
        .upload-text {
            font-size: 1.15em;
            color: #555;
            margin-bottom: 6px;
        }
        .upload-hint {
            font-size: 0.98em;
            color: #aaa;
        }
        #file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .btn-main {
            background: linear-gradient(90deg, #6c63ff 0%, #48c6ef 100%);
            color: #fff;
            border: none;
            padding: 16px 0;
            border-radius: 12px;
            font-size: 1.18em;
            font-weight: 700;
            width: 100%;
            margin: 18px 0 0 0;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(76, 99, 255, 0.08);
            transition: background 0.2s, box-shadow 0.2s;
        }
        .btn-main:hover {
            background: linear-gradient(90deg, #48c6ef 0%, #6c63ff 100%);
            box-shadow: 0 4px 16px rgba(76, 99, 255, 0.13);
        }
        .progress {
            width: 100%;
            height: 6px;
            background-color: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
            margin: 18px 0 0 0;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #6c63ff 0%, #48c6ef 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
        .status {
            margin: 18px 0 0 0;
            padding: 13px;
            border-radius: 8px;
            display: none;
            font-size: 1em;
        }
        .status.success {
            background-color: #e6fbe6;
            color: #1a7f37;
            border: 1px solid #b2e6b2;
        }
        .status.error {
            background-color: #fde6e6;
            color: #b71c1c;
            border: 1px solid #f5b2b2;
        }
        .status.processing {
            background-color: #e6f0fb;
            color: #1a3c7f;
            border: 1px solid #b2c6e6;
        }
        .preview {
            margin: 18px 0 0 0;
            display: none;
        }
        .preview img {
            max-width: 100%;
            max-height: 220px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }
        .examples-title {
            font-size: 1.1em;
            color: #888;
            margin: 36px 0 12px 0;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .examples-gallery {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .example-thumb {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: #f0f0f0;
            object-fit: cover;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1.5px solid #eee;
        }
        @media (max-width: 600px) {
            .main-card {
                padding: 24px 6vw 18px 6vw;
            }
            .examples-gallery {
                gap: 7px;
            }
            .example-thumb {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="brand-title">AddTeXT.io</div>
        <div class="subtitle">Auto Insert text between your images</div>
        <div class="upload-area" id="upload-area">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Drop your image here or click to browse</div>
            <div class="upload-hint">Supports: JPG, PNG, GIF, BMP (Max 10MB)</div>
            <input type="file" id="file-input" accept="image/*">
        </div>
        <div class="preview" id="preview">
            <img id="preview-img" src="" alt="Preview">
        </div>
        <button class="btn-main" id="upload-btn" style="display: none;">Try Now</button>
        <div class="progress" id="progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="status" id="status"></div>
        <div class="examples-title">Example Thumbnails</div>
        <div class="examples-gallery">
            <img class="example-thumb" src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308?auto=format&fit=crop&w=400&q=80" alt="Example 1">
            <img class="example-thumb" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=400&q=80" alt="Example 2">
            <img class="example-thumb" src="https://images.unsplash.com/photo-1465101046530-73398c7f28ca?auto=format&fit=crop&w=400&q=80" alt="Example 3">
            <img class="example-thumb" src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308?auto=format&fit=crop&w=400&q=80" alt="Example 4">
            <img class="example-thumb" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=400&q=80" alt="Example 5">
        </div>
    </div>
    <script>
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progress-bar');
        const status = document.getElementById('status');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('preview-img');
        let selectedFile = null;
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showStatus('Please select a valid image file.', 'error');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showStatus('File size must be less than 10MB.', 'error');
                return;
            }
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                preview.style.display = 'block';
                uploadBtn.style.display = 'block';
            };
            reader.readAsDataURL(file);
            showStatus('Image selected! Click "Try Now" to continue.', 'success');
        }
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            uploadBtn.disabled = true;
            progress.style.display = 'block';
            showStatus('Uploading image and removing background...', 'processing');
            const formData = new FormData();
            formData.append('file', selectedFile);
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.success) {
                    showStatus('Background removed successfully! Opening editor...', 'success');
                    setTimeout(() => {
                        window.location.href = `/editor/${result.session_id}`;
                    }, 1000);
                } else {
                    showStatus(result.error || 'An error occurred.', 'error');
                    uploadBtn.disabled = false;
                }
            } catch (error) {
                showStatus('Network error. Please try again.', 'error');
                uploadBtn.disabled = false;
            }
            progress.style.display = 'none';
        });
        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }
        function updateProgress(percent) {
            progressBar.style.width = percent + '%';
        }
        let progressInterval;
        uploadBtn.addEventListener('click', () => {
            let progress = 0;
            progressInterval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 90) progress = 90;
                updateProgress(progress);
            }, 200);
        });
    </script>
</body>
</html>
